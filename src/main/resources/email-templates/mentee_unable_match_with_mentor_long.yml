NO_MATCH_MENTOR_LONG:
  subject: "Update on Your Mentorship Application – Women Coding Community"
  body: |
    <p>Dear {{menteeNames}},</p>

    <p>
    Thank you so much for your interest in the <strong>{{year}} Women Coding Community Mentorship Programme</strong>.
    </p>

    <p>
    At this time, we haven’t been able to match you with any of the mentors you applied for.
    We understand how important mentorship is and share your disappointment in not securing a match at this time.
    </p>

    <p>
    However, we would like to assure you that your journey with us is just beginning.
    Your profile will remain on our waiting list, and if a mentor becomes available or a spot opens up,
    we’ll reach out to you right away.
    </p>

    <p>
      In the meantime, we encourage you to attend the upcoming <a href="{{launchEventUrl}}">{{year}} Launch Event</a> to hear from previous mentors & mentees and benefit from the panel session.
      You may also consider applying for our upcoming monthly <a href="{{adhocMentorshipUrl}}">ad-hoc mentorship</a> to connect with mentors who have expertise in your field.
      Please note that applications for these mentoring sessions open at the beginning of each month,
      and you can apply during the <strong>first 10 days of each month</strong>.
    </p>

    <p>If you have any questions or concerns, please do not hesitate to contact us via email or Slack.</p>
    <p>Thank you again for your interest in the mentorship programme. We appreciate your patience and understanding, and we look forward to connecting you with a mentor soon.</p>

    <p>
    {{teamEmailSignature}}
    </p>
