RESET_PASSWORD:
  subject: "Reset Your Password — Women Coding Community"
  body: |
    <p>Dear {{recipientName}},</p>

    <p>
    A password reset has been requested for your <strong>Women Coding Community</strong> account.
    </p>

    <p>
    Click the link below to set a new password. This link can only be used once.
    </p>

    <p>
    <a href="{{resetLink}}">Reset your password</a>
    </p>

    <p>
    If you did not request a password reset, please ignore this email.
    Your password will remain unchanged.
    </p>

    <p>
    {{teamEmailSignature}}
    </p>
